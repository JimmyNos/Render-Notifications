schema_version = "1.0.0"

id = "render_notifications_extension"
version = "1.3.0"
name = "Render Notifications"
tagline = "Notifies you via Discord, desktop, or webhook on render events"
maintainer = "Michael Mosako (JimmyNoStar)"
type = "add-on"
website = "https://github.com/JimmyNos/Render-Notifications"
tags = ["Render", "System"]
blender_version_min = "4.3.2"

license = [
  "SPDX:GPL-3.0-or-later",
]

platforms = ["windows-x64"]
wheels = [
  # Python 3.11 (Blender 5.0)
  "./wheels/py_3.11/aiohappyeyeballs-2.6.1-py3-none-any.whl",
  "./wheels/py_3.11/aiohttp-3.12.14-cp311-cp311-win_amd64.whl",
  "./wheels/py_3.11/aiosignal-1.4.0-py3-none-any.whl",
  "./wheels/py_3.11/attrs-25.3.0-py3-none-any.whl",
  "./wheels/py_3.11/colorama-0.4.6-py2.py3-none-any.whl",
  "./wheels/py_3.11/discord_py-2.5.2-py3-none-any.whl",
  "./wheels/py_3.11/frozenlist-1.7.0-cp311-cp311-win_amd64.whl",
  "./wheels/py_3.11/idna-3.10-py3-none-any.whl",
  "./wheels/py_3.11/loguru-0.6.0-py3-none-any.whl",
  "./wheels/py_3.11/multidict-6.6.3-cp311-cp311-win_amd64.whl",
  "./wheels/py_3.11/notify_py-0.3.43-py3-none-any.whl",
  "./wheels/py_3.11/propcache-0.3.2-cp311-cp311-win_amd64.whl",
  "./wheels/py_3.11/typing_extensions-4.14.1-py3-none-any.whl",
  "./wheels/py_3.11/win32_setctime-1.2.0-py3-none-any.whl",
  "./wheels/py_3.11/yarl-1.20.1-cp311-cp311-win_amd64.whl",

  # Python 3.13 (Blender 5.1)
  "./wheels/py_3.13/aiohappyeyeballs-2.6.1-py3-none-any.whl",
  "./wheels/py_3.13/aiohttp-3.13.3-cp313-cp313-win_amd64.whl",
  "./wheels/py_3.13/aiosignal-1.4.0-py3-none-any.whl",
  "./wheels/py_3.13/attrs-26.1.0-py3-none-any.whl",
  "./wheels/py_3.13/audioop_lts-0.2.2-cp313-abi3-win_amd64.whl",
  "./wheels/py_3.13/colorama-0.4.6-py2.py3-none-any.whl",
  "./wheels/py_3.13/discord_py-2.7.1-py3-none-any.whl",
  "./wheels/py_3.13/frozenlist-1.8.0-cp313-cp313-win_amd64.whl",
  "./wheels/py_3.13/idna-3.11-py3-none-any.whl",
  "./wheels/py_3.13/loguru-0.6.0-py3-none-any.whl",
  "./wheels/py_3.13/multidict-6.7.1-cp313-cp313-win_amd64.whl",
  "./wheels/py_3.13/propcache-0.4.1-cp313-cp313-win_amd64.whl",
  "./wheels/py_3.13/yarl-1.23.0-cp313-cp313-win_amd64.whl",
  "./wheels/py_3.13/notify_py-0.3.43-py3-none-any.whl",
  "./wheels/py_3.13/win32_setctime-1.2.0-py3-none-any.whl",
  "./wheels/py_3.13/loguru-0.6.0-py3-none-any.whl",
]

[permissions]
network = "Needed to send notifications via webhooks and Discord"

# Optional: advanced build settings.
# https://docs.blender.org/manual/en/dev/advanced/extensions/command_line_arguments.html#command-line-args-extension-build
[build]
paths_exclude_pattern = [
  "__pycache__/",
  "/.git/",
  "/*.zip",
  "resources/images/readme",
  "Templates/"
]